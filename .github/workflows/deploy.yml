name: CI / CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Run tests on every push / PR ──────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  # ── Deploy to VPS (master only, after tests pass) ─────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: OPENAI_API_KEY
          script: |
            set -e
            cd /root/decisioning-engine

            # Pull latest code (reset hard handles force-pushed history cleanly)
            git fetch origin master
            git reset --hard origin/master

            # Write secrets to .env.prod — never stored in the repo
            printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY" > .env.prod

            # Rebuild and restart containers
            docker compose -f docker-compose.prod.yml up --build -d

            # Remove dangling images to reclaim disk
            docker image prune -f
